name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci
          npm run build --if-present

      - name: Create plugin archive
        run: |
          mkdir -p dist
          mkdir -p eventeule
          
          # Kopiere nur die notwendigen Dateien/Ordner für WordPress
          cp EventEule.php eventeule/
          cp uninstall.php eventeule/
          cp LICENSE eventeule/
          cp README.md eventeule/
          cp -r src eventeule/
          cp -r assets eventeule/
          cp -r languages eventeule/
          cp -r templates eventeule/
          cp -r vendor eventeule/
          
          # Erstelle ZIP aus dem eventeule/ Ordner
          cd eventeule
          zip -r ../dist/eventeule-${{ steps.get_version.outputs.VERSION }}.zip . -x "*.DS_Store"
          cd ..

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            Release version ${{ steps.get_version.outputs.VERSION }}
            
            ## Installation
            1. Download `eventeule-${{ steps.get_version.outputs.VERSION }}.zip`
            2. In WordPress Admin: Plugins → Add New → Upload Plugin
            3. Choose the downloaded file and click Install Now
            4. Activate the plugin
            
            ## Update
            If you have the plugin already installed, you can update it directly from WordPress Admin.
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/eventeule-${{ steps.get_version.outputs.VERSION }}.zip
          asset_name: eventeule-${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip
