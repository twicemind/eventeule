name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci
          npm run build --if-present

      - name: Create plugin archive
        run: |
          mkdir -p dist
          mkdir -p eventeule
          
          # Copy only necessary files/folders for WordPress
          cp EventEule.php eventeule/
          cp uninstall.php eventeule/
          cp LICENSE eventeule/
          cp README.md eventeule/
          cp -r src eventeule/
          cp -r assets eventeule/
          cp -r languages eventeule/
          cp -r templates eventeule/
          cp -r vendor eventeule/
          
          # Create ZIP from eventeule/ folder
          cd eventeule
          zip -r ../dist/eventeule-${{ steps.get_version.outputs.VERSION }}.zip . -x "*.DS_Store"
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/eventeule-${{ steps.get_version.outputs.VERSION }}.zip
          body: |
            Release version ${{ steps.get_version.outputs.VERSION }}
            
            ## Installation
            1. Download `eventeule-${{ steps.get_version.outputs.VERSION }}.zip`
            2. In WordPress Admin: Plugins → Add New → Upload Plugin
            3. Choose the downloaded file and click Install Now
            4. Activate the plugin
            
            ## Update
            If you have the plugin already installed, you can update it directly from WordPress Admin.
          draft: false
          prerelease: false
